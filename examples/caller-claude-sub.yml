# Copy this into a repo as .github/workflows/dev-agent.yml.
#
# This is the SUBSCRIPTION-ONLY caller — it passes provider=claude-sub (no API key).
#
# Required repo (or org) secrets:
#   CLAUDE_CODE_OAUTH_TOKEN  - from `claude setup-token` (the subscription token)
#   DEV_BOT_PAT              - PAT of the dedicated bot account, repo write scope.
#                             Must NOT be the default GITHUB_TOKEN, or CI won't run
#                             on the agent's PRs.

name: Dev agent
on:
  issues:
    types: [labeled]
  pull_request:
    types: [labeled]

# One run at a time per issue/PR; never cancel a run mid-commit.
concurrency:
  group: ai-code-agent-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  dev-agent:
    # Only fire for our trigger labels (incl. -opus/-sonnet/-haiku suffixes).
    if: >-
      startsWith(github.event.label.name, 'ai-ready') ||
      startsWith(github.event.label.name, 'ai-needs-changes') ||
      startsWith(github.event.label.name, 'ai-plan') ||
      startsWith(github.event.label.name, 'ai-discussion')
    runs-on: ubuntu-latest
    steps:
      - uses: lwinmgmg/ai-code-agent@v1   # pin to a tag once released
        with:
          provider: claude-sub
          provider_key: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.DEV_BOT_PAT }}
          language: "go,node,bun"
          base_branch: main
